# Data Configuration
data:
  date_range:
    start: 2024-01-01
    end: 2026-12-31
  min_sample_size: 5

# Anomaly Detection Settings
anomaly:
  threshold: 0.30  # 30% deviation
  method: weighted_average_by_enstr
  confidence_level: 0.95

# API Configuration
api:
  host: 0.0.0.0
  port: 8000
  workers: 4

# Database Configuration
database:
  clickhouse:
    host: localhost
    port: 9440
    database: procurement
    timeout: 30
    compression: lz4

# LLM Configuration
llm:
  provider: nitec-ai
  model: openai/gpt-oss-120b
  temperature: 0.7
  max_tokens: 2000

# Logging
logging:
  level: INFO
  format: json
  output: console
